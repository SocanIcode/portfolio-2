<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Azeb Samuel — Frontend Developer & UX/UI Designer. I build responsive, accessible web experiences and showcase selected projects here."
    />
    <title>Azeb Portfolio - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/css/style.css" />
    <link rel="stylesheet" href="styles/css/media.css" />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        emailjs.init("sbV7xnoLQtXTZQnNn");
      })();
    </script>
  </head>
  <body
    class="min-h-screen text-white bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-950"
  >
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md py-4">
      <div class="container mx-auto px-6">
        <div
          class="flex flex-col md:flex-row md:justify-between md:items-center gap-3"
        >
          <div
            class="text-2xl font-bold flex items-center gap-2"
            aria-label="Azeb Samuel"
          >
            <span class="text-glitter glitter-scroll tracking-wide">AS</span>
            <span class="logo-wave" aria-hidden="true">👋</span>
          </div>

          <div class="flex flex-wrap gap-x-4 gap-y-2 text-sm md:text-base">
            <a
              href="/index.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >Home</a
            >
            <a
              href="./about.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >About</a
            >

            <a
              href="./contact.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >Contact</a
            >
          </div>
        </div>
      </div>
    </nav>
    <!-- Contact Section -->
    <section id="contact" class="py-20 px-6">
      <div class="container mx-auto">
        <div class="text-center mb-12">
          <h2 class="text-4xl md:text-5xl font-bold mb-4">
            Get In <span class="text-gradient">Touch</span>
          </h2>
          <div class="w-24 h-1 gradient-bg mx-auto rounded-full"></div>
        </div>

        <div class="grid md:grid-cols-2 gap-12 max-w-6xl mx-auto">
          <div>
            <h3 class="text-2xl font-semibold text-white mb-6">
              Let's Connect👋
            </h3>
            <p class="text-gray-300 mb-8">
              Always open to new opportunities—feel free to reach out ✨
            </p>

            <div class="space-y-4">
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center"
                >
                  <i class="fas fa-envelope text-purple-400"></i>
                </div>
                <div>
                  <p class="text-gray-400 text-sm">Email</p>
                  <p class="text-white">azebsame@gmail.com</p>
                </div>
              </div>

              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center"
                >
                  <i class="fas fa-phone text-purple-400"></i>
                </div>
                <div>
                  <p class="text-gray-400 text-sm">Phone</p>
                  <p class="text-white">+46700418127</p>
                </div>
              </div>

              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center"
                >
                  <i class="fas fa-map-marker-alt text-purple-400"></i>
                </div>
                <div>
                  <p class="text-gray-400 text-sm">Location</p>
                  <p class="text-white">Stockholm, Sweden</p>
                </div>
              </div>
            </div>
          </div>

          <div>
            <form id="contactForm" class="glass-effect rounded-xl p-6">
              <div class="mb-4">
                <label class="block text-gray-300 mb-2">Name</label>
                <input
                  type="text"
                  class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                  placeholder="Your Name"
                />
              </div>

              <div class="mb-4">
                <label class="block text-gray-300 mb-2">Email</label>
                <input
                  type="email"
                  class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                  placeholder="your@email.com"
                />
              </div>

              <div class="mb-6">
                <label class="block text-gray-300 mb-2">Message</label>
                <textarea
                  rows="5"
                  class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 resize-none"
                  placeholder="Your message..."
                ></textarea>
              </div>

              <button
                type="submit"
                class="w-full px-6 py-3 gradient-bg text-white rounded-lg font-medium hover:shadow-lg hover:shadow-purple-500/25 transition-all duration-300 hover-scale"
              >
                <i class="fas fa-paper-plane mr-2"></i> Send Message
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 px-6 border-t border-white/10">
      <div class="container mx-auto">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div class="text-gray-400">
            © 2024 Azeb Samuel. All rights reserved.
          </div>

          <div class="flex gap-4">
            <a
              href="https://github.com/SocanIcode"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fab fa-github"></i>
            </a>
            <a
              href="https://www.linkedin.com/in/azebsamuel"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fab fa-linkedin"></i>
            </a>
            <a
              href="mailto:azebsame@gmail.com"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fas fa-envelope"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="scripts/js/main.js"></script>
    <script src="scripts/js/script.js"></script>
    <script src="scripts/js/contact.js"></script>
  </body>
</html>

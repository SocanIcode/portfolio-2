<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Azeb Samuel — Frontend Developer & UX/UI Designer. I build responsive, accessible web experiences and showcase selected projects here."
    />
    <title>Azeb Portfolio Preview - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/css/style.css" />
    <link rel="stylesheet" href="styles/css/media.css" />
  </head>
  <body
    class="min-h-screen text-white bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-950"
  >
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md py-4">
      <div class="container mx-auto px-6">
        <div
          class="flex flex-col md:flex-row md:justify-between md:items-center gap-3"
        >
          <div
            class="text-2xl font-bold flex items-center gap-2"
            aria-label="Azeb Samuel"
          >
            <span class="text-glitter glitter-scroll tracking-wide">AS</span>
            <span class="logo-wave" aria-hidden="true">👋</span>
          </div>

          <div class="flex flex-wrap gap-x-4 gap-y-2 text-sm md:text-base">
            <a
              href="./index.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >Home</a
            >
            <a
              href="./about.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >About</a
            >

            <a
              href="./contact.html"
              class="text-gray-300 hover:text-teal-400 transition-colors"
              >Contact</a
            >
          </div>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section
      id="home"
      class="min-h-screen flex items-center justify-center px-6 pt-24"
    >
      <div class="container mx-auto">
        <div class="grid md:grid-cols-2 gap-12 md:px-12 items-center">
          <div>
            <h1 class="text-5xl md:text-7xl font-bold mb-4 leading-tight">
              <span class="text-glitter glitter-scroll">Hi, I'm Azeb</span>
            </h1>

            <p class="text-xl md:text-2xl text-gray-300 mb-3">
              Frontend Developer
            </p>

            <p class="text-lg text-gray-400 mb-8">
              Designing and building responsive, accessible, and user-focused
              digital experiences
            </p>

            <div class="flex flex-wrap gap-4 mb-8">
              <a
                href="#contact"
                class="px-6 py-3 gradient-bg text-white rounded-lg font-medium hover:shadow-lg hover:shadow-purple-500/25 transition-all duration-300 hover-scale"
              >
                Get In Touch
              </a>

              <a
                href="./assets/cv/Azeb-Samuel-CV.pdf"
                download="Azeb-Samuel-CV.pdf"
                class="px-6 py-3 border border-purple-500 text-teal-400 rounded-full font-medium hover:shadow-lg hover:shadow-purple-500/25 transition-all duration-300 hover-scale"
              >
                <i class="fas fa-download mr-2"></i> Download CV
              </a>
            </div>

            <div class="flex gap-4" aria-label="Social links">
              <a
                href="https://github.com/SocanIcode"
                target="_blank"
                rel="noopener noreferrer"
                class="w-12 h-12 glass-effect rounded-full flex items-center justify-center hover:!bg-purple-500/40 transition-colors duration-300"
                aria-label="GitHub"
              >
                <i class="fab fa-github"></i>
              </a>

              <a
                href="https://www.linkedin.com/in/azebsamuel"
                target="_blank"
                rel="noopener noreferrer"
                class="w-12 h-12 glass-effect rounded-full flex items-center justify-center hover:!bg-purple-500/40 transition-colors duration-300"
                aria-label="LinkedIn"
              >
                <i class="fab fa-linkedin"></i>
              </a>

              <a
                href="mailto:azebsame@gmail.com"
                class="w-12 h-12 glass-effect rounded-full flex items-center justify-center hover:!bg-purple-500/40 transition-colors duration-300"
                aria-label="Email"
              >
                <i class="fas fa-envelope"></i>
              </a>
            </div>
          </div>

          <div class="relative">
            <div class="relative w-80 h-80 mx-auto">
              <div
                class="absolute inset-0 gradient-bg rounded-full blur-2xl opacity-30 animate-pulse"
                aria-hidden="true"
              ></div>

              <img
                src="images/9.jpg"
                alt="Portrait of Azeb"
                class="relative w-full h-full rounded-full object-cover border-4 border-white/10"
                loading="lazy"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="py-20 px-6">
      <div class="container mx-auto">
        <div class="text-center mb-12">
          <h2 class="text-4xl md:text-5xl font-bold mb-4">
            Featured <span class="text-gradient">Projects</span>
          </h2>
          <div class="w-24 h-1 gradient-bg mx-auto rounded-full mb-8"></div>

          <div class="flex flex-col items-center mb-8 w-full">
            <div
              id="type-filters"
              class="flex flex-wrap justify-center gap-6 mb-4 w-full"
            ></div>

            <div
              id="tech-filters"
              class="flex flex-wrap justify-center gap-4 hidden w-full"
            ></div>
          </div>
        </div>

        <div
          class="portfolio-grid grid md:grid-cols-3 gap-8 max-w-6xl mx-auto"
        ></div>
      </div>
    </section>
    <!-- Skills Section -->
    <section id="skills" class="py-20 px-6">
      <div class="container mx-auto">
        <div class="text-center mb-12">
          <h2 class="text-4xl md:text-5xl font-bold mb-4">
            Technical <span class="text-gradient">Skills</span>
          </h2>
          <div class="w-24 h-1 gradient-bg mx-auto rounded-full"></div>
        </div>

        <div class="max-w-6xl mx-auto">
          <div class="glass-effect rounded-lg p-6">
            <div class="skills-descriptions text-gray-300"></div>
          </div>
        </div>
      </div>
    </section>
    <!-- Footer -->
    <footer class="py-8 px-6 border-t border-white/10">
      <div class="container mx-auto">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div class="text-gray-400">
            © 2024 Azeb Samuel. All rights reserved.
          </div>

          <div class="flex gap-4">
            <a
              href="https://github.com/SocanIcode"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fab fa-github"></i>
            </a>
            <a
              href="https://www.linkedin.com/in/azebsamuel"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fab fa-linkedin"></i>
            </a>
            <a
              href="mailto:azebsame@gmail.com"
              class="w-10 h-10 glass-effect rounded-full flex items-center justify-center hover:bg-purple-500/20 transition-all"
            >
              <i class="fas fa-envelope"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="scripts/js/main.js"></script>
    <script src="scripts/js/badges-tools.js"></script>
    <script src="scripts/js/card.js"></script>
    <script src="scripts/js/script.js"></script>

    <!-- AI assistant widget -->
    <div id="ai-agent-root">
      <button id="ai-toggle" aria-label="Open assistant">🤖</button>

      <div id="ai-panel" aria-hidden="true">
        <header>
          <strong>Project Assistant</strong>
          <button id="ai-close" aria-label="Close">✕</button>
        </header>

        <div id="ai-messages"></div>

        <form id="ai-form">
          <input
            id="ai-input"
            placeholder="Ask: e.g. show school projects with React"
            autocomplete="off"
          />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>

    <script src="scripts/js/ai-agent.js"></script>
  </body>
</html>
